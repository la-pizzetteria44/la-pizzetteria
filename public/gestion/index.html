<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://tortue-ninja.netlify.app/gestion/" />
    <title>Gestion du site</title>

    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: white;
        height: 100vh;
      }

    </style>
  </head>

  <body>
    <noscript>
    <p style="text-align:center;margin-top:2rem;">
        JavaScript est requis pour accéder à l'administration.
    </p>
    </noscript>
    <script src="https://unpkg.com/netlify-identity-widget/build/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script >
        netlifyIdentity.on("login", () => {
        document.location.href = "/gestion/";
        });

        const url = new URL(window.location.href);
        const params = url.searchParams;

        if (
        params.has("invite_token") ||
        params.has("recovery_token")
        ) {
        netlifyIdentity.open();
        }
    </script>
  </body>
</html>
