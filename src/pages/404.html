<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico">
    <title>La Pizzetteria - 404 Not Found</title>
</head>
<body>

  <div class="header-404">
    <div class="header__logo">
        <a href="/">
            <img 
                src="/public/images/logo.png"
                alt="Logo de la pizzetteria"
                class="header__logo-img"
            />
        </a>
    </div>
    La Pizzetteria
  </div>

  <section class="error">
    <div class="error__content">
      
      <h1>404 🍕</h1>
      
      <h2>Oups… cette pizza n’existe pas</h2>
      
      <p>
        On dirait que cette page a disparu du menu…
        mais pas de panique, nos pizzas sont bien là 👇
      </p>

      <div class="error__actions">
        <a href="/" class="btn btn--primary">Accueil</a>
        <a href="/menu" class="btn btn--secondary">Voir le menu</a>
      </div>

    </div>
  </section>

  <div class="footer-404">
    © La Pizzetteria
  </div>

</body>
</html>

<style>
 body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #fff;
  color: #1f2937;
}

.header-404 {
  background: #0b6a22;
  color: #fff;
  padding: 1rem;
  text-align: center;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  font-size: 1.6rem;
}

.header__logo img{
    border-radius: 50%;
    width: 40px;
    height: 40px;
}

.error {
  min-height: calc(100vh - 120px);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}

.error__content {
  max-width: 500px;
}

.error h1 {
  font-size: 5rem;
  margin-bottom: 1rem;
}

.error h2 {
  font-size: 2rem;
  margin-bottom: 1rem;
}

.error p {
  color: #6b7280;
  margin-bottom: 2rem;
}

.error__actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
}

.btn {
  border-radius: 12px;
  font-weight: 600;
  padding: 0.7rem 1.2rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: all 0.2s ease;
}

.btn--primary {
  background: #e63946;
  color: #fff;
}

.btn--secondary {
  border: 1px solid rgba(0,0,0,0.4);
  color: #333;
}

.btn:hover {
  transform: translateY(-1px);
}

/* FOOTER SIMPLE */
.footer-404 {
  text-align: center;
  padding: 1rem;
  font-size: 1.3rem;
  color: #9ca3af;
}
</style>
